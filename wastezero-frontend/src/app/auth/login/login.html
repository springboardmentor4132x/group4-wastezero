<div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-green-100 via-white to-green-200 px-4">

  <div class="bg-white shadow-2xl rounded-3xl p-10 w-full max-w-md transition-all duration-300">

    <!-- Logo -->
    <h2 class="text-3xl font-bold text-center text-green-600 mb-2">
      🌱 WasteZero
    </h2>

    <p class="text-center text-gray-500 mb-8 text-sm">
      Smart Waste Pickup & Recycling Platform
    </p>

    <form [formGroup]="loginForm"
          (ngSubmit)="onSubmit()"
          class="space-y-6">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Email
        </label>

        <input type="email"
               formControlName="email"
               placeholder="Enter your email"
               class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none transition duration-200">

        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
             class="text-red-500 text-sm mt-2">

          <span *ngIf="loginForm.get('email')?.errors?.['required']">
            Email is required
          </span>

          <span *ngIf="loginForm.get('email')?.errors?.['email']">
            Please enter a valid email address
          </span>

        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Password
        </label>

        <input type="password"
               formControlName="password"
               placeholder="Enter your password"
               class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none transition duration-200">

        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
             class="text-red-500 text-sm mt-2">

          <span *ngIf="loginForm.get('password')?.errors?.['required']">
            Password is required
          </span>

        </div>
      </div>

      <!-- Backend Error -->
      <div *ngIf="errorMessage"
           class="bg-red-100 text-red-600 text-sm p-3 rounded-lg text-center">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button type="submit"
              [disabled]="isLoading"
              class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition duration-300 shadow-md disabled:opacity-60 disabled:cursor-not-allowed">

        {{ isLoading ? 'Logging in...' : 'Login' }}

      </button>

    </form>

    <!-- Register Link -->
    <p class="text-center text-sm text-gray-500 mt-8">
      Don't have an account?
      <a routerLink="/register"
         class="text-green-600 font-semibold hover:underline transition">
        Register
      </a>
    </p>

  </div>

</div>
