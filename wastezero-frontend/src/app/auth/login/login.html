<div class="flex items-center justify-center min-h-screen bg-[#0a0f0a] px-4 relative overflow-hidden">

  <!-- background glow -->
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
    <div class="w-96 h-96 bg-green-700/20 rounded-full blur-3xl"></div>
  </div>

  <div class="relative z-10 w-full max-w-md">

    <!-- Card -->
    <div class="bg-white/[0.03] border border-green-900/30 rounded-3xl p-10 w-full backdrop-blur-sm">

      <!-- Logo -->
      <div class="flex items-center justify-center gap-2 mb-2">
        <span class="w-2.5 h-2.5 bg-green-400 rounded-full animate-pulse"></span>
        <h2 class="text-2xl font-bold text-green-300 tracking-tight">WasteZero</h2>
      </div>

      <p class="text-center text-green-700 text-sm mb-10">
        Smart Waste Pickup & Recycling Platform
      </p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-xs font-medium text-green-500 uppercase tracking-widest mb-2">
            Email
          </label>
          <input
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            class="w-full px-4 py-3 bg-white/[0.04] border border-green-900/40 rounded-xl text-green-100 placeholder-green-800 focus:outline-none focus:border-green-600 focus:bg-white/[0.06] transition-all text-sm"
          />
          <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
               class="text-red-400 text-xs mt-1.5 pl-1">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email</span>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-medium text-green-500 uppercase tracking-widest mb-2">
            Password
          </label>
          <input
            type="password"
            formControlName="password"
            placeholder="Enter your password"
            class="w-full px-4 py-3 bg-white/[0.04] border border-green-900/40 rounded-xl text-green-100 placeholder-green-800 focus:outline-none focus:border-green-600 focus:bg-white/[0.06] transition-all text-sm"
          />
          <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
               class="text-red-400 text-xs mt-1.5 pl-1">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
          </div>
        </div>

        <!-- Backend Error -->
        <div *ngIf="errorMessage"
             class="bg-red-900/20 border border-red-800/40 text-red-400 text-sm p-3 rounded-xl text-center">
          {{ errorMessage }}
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full bg-green-700 text-green-50 py-3 rounded-xl font-semibold hover:bg-green-600 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed mt-2 text-sm tracking-wide">
          {{ isLoading ? 'Logging in...' : 'Login' }}
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-7">
        <div class="flex-1 h-px bg-green-900/40"></div>
        <span class="text-green-800 text-xs">or</span>
        <div class="flex-1 h-px bg-green-900/40"></div>
      </div>

      <!-- Register Link -->
      <p class="text-center text-sm text-green-700">
        Don't have an account?
        <a routerLink="/register" class="text-green-400 font-semibold hover:text-green-300 transition ml-1">
          Register
        </a>
      </p>

    </div>

    <!-- bottom label -->
    <p class="text-center text-green-900 text-xs mt-6">
      © 2025 WasteZero. All rights reserved.
    </p>

  </div>
</div>
