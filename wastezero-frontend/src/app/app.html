<!-- AUTH PAGES (NO SIDEBAR, NO NAVBAR) -->
<ng-container *ngIf="isAuthPage(); else mainLayout">
  <router-outlet></router-outlet>
</ng-container>

<!-- MAIN APP LAYOUT -->
<ng-template #mainLayout>
  <div class="flex h-screen bg-[#0a0f0a] overflow-hidden">

    <!-- Sidebar — fixed width -->
    <app-sidebar></app-sidebar>

    <!-- Right side — navbar + content -->
    <div class="flex flex-col flex-1 ml-64 min-w-0 overflow-hidden">

      <!-- Navbar — full width of right side -->
      <app-navbar></app-navbar>

      <!-- Page content — scrollable -->
      <main class="flex-1 overflow-y-auto bg-[#0a0f0a]">
        <router-outlet></router-outlet>
      </main>

    </div>

  </div>
</ng-template>
