<div class="animate-fade-up space-y-10">

  <div>
    <h2 class="text-3xl font-bold text-gray-800">
      Welcome 👋
    </h2>
    <p class="text-gray-500 mt-2">
      Track your waste pickup activity.
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

    <div class="bg-white p-6 rounded-3xl shadow-md hover:shadow-2xl transition duration-300 hover:-translate-y-2">
      <p class="text-gray-500 text-sm">Total Pickups</p>
      <h3 class="text-4xl font-bold text-green-600 mt-3">
        {{ totalPickups }}
      </h3>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-md hover:shadow-2xl transition duration-300 hover:-translate-y-2">
      <p class="text-gray-500 text-sm">Completed</p>
      <h3 class="text-4xl font-bold text-green-600 mt-3">
        {{ completed }}
      </h3>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-md hover:shadow-2xl transition duration-300 hover:-translate-y-2">
      <p class="text-gray-500 text-sm">Pending</p>
      <h3 class="text-4xl font-bold text-green-600 mt-3">
        {{ pending }}
      </h3>
    </div>

  </div>

</div>
