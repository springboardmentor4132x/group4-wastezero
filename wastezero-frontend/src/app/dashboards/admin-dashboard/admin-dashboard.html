<div class="p-8 bg-gray-100 min-h-screen animate-fade-up">

  <div class="mb-8">
    <h1 class="text-3xl font-black text-gray-800">
      Master Control: <span class="text-green-600 uppercase">{{ userName }}</span>
    </h1>
    <p class="text-gray-400 font-medium uppercase tracking-[0.3em] text-[10px] mt-1">Platform Administrator Overview</p>
  </div>

  <!-- Stats Cards -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">

    <div
      class="bg-white p-6 rounded-3xl shadow-md border-b-4 border-b-green-500 hover:shadow-2xl transition duration-300">
      <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Opportunities</p>
      <h2 class="text-4xl font-black text-gray-800 mt-2">
        {{ totalOpportunities }}
      </h2>
    </div>

    <div
      class="bg-white p-6 rounded-3xl shadow-md border-b-4 border-b-blue-500 hover:shadow-2xl transition duration-300">
      <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Pickups</p>
      <h2 class="text-4xl font-black text-gray-800 mt-2">
        {{ totalPickups }}
      </h2>
    </div>

    <div
      class="bg-white p-6 rounded-3xl shadow-md border-b-4 border-b-yellow-500 hover:shadow-2xl transition duration-300">
      <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Volunteers</p>
      <h2 class="text-4xl font-black text-gray-800 mt-2">
        {{ totalVolunteers }}
      </h2>
    </div>

    <div
      class="bg-white p-6 rounded-3xl shadow-md border-b-4 border-b-red-500 hover:shadow-2xl transition duration-300">
      <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Applications</p>
      <h2 class="text-4xl font-black text-gray-800 mt-2">
        {{ totalApplications }}
      </h2>
    </div>

    <!-- Admin Profile Section -->
    <div
      class="bg-black p-6 rounded-3xl shadow-xl hover:shadow-2xl transition duration-300 text-white flex flex-col justify-center">
      <p class="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-2">Admin Profile</p>
      <h3 class="text-lg font-black truncate">{{ userName }}</h3>
      <div class="mt-2 flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-red-600 animate-pulse"></span>
        <span class="text-[9px] font-black tracking-[0.2em] uppercase text-red-500">System Root</span>
      </div>
    </div>

  </div>

  <div class="mt-12 flex gap-4">
    <button routerLink="/admin"
      class="bg-green-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-green-700 hover:shadow-2xl transition hover:-translate-y-1">
      🛠 Manage Opportunities
    </button>
    <button routerLink="/admin/pickups"
      class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 hover:shadow-2xl transition hover:-translate-y-1">
      🚚 Manage Pickups
    </button>
  </div>

</div>
