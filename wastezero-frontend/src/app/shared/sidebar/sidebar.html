<div class="fixed top-0 left-0 h-screen w-64 bg-gray-900 text-gray-200 shadow-2xl flex flex-col">

  <!-- Logo -->
  <div class="p-8 text-2xl font-black border-b border-gray-800 tracking-tighter text-white">
    🌱 <span class="text-green-500">Waste</span>Zero
  </div>

  <!-- Navigation -->
  <nav class="flex-1 mt-8 px-4 space-y-3 text-sm">

    <!-- USER -->
    <ng-container *ngIf="role === 'user'">
      <a routerLink="/dashboard-user" routerLinkActive="bg-green-600 text-white shadow-lg"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition duration-300 font-bold">
        📊 Dashboard
      </a>

      <a routerLink="/schedule-pickup" routerLinkActive="bg-green-600 text-white shadow-lg"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition duration-300 font-bold">
        ♻️ Schedule Pickup
      </a>
    </ng-container>

    <!-- VOLUNTEER -->
    <ng-container *ngIf="role === 'volunteer'">
      <a routerLink="/dashboard-volunteer" routerLinkActive="bg-blue-600 text-white shadow-lg"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition duration-300 font-bold">
        📊 Dashboard
      </a>

      <a routerLink="/opportunities" routerLinkActive="bg-blue-600 text-white shadow-lg"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition duration-300 font-bold">
        📦 Opportunities
      </a>

      <a routerLink="/volunteer/pickups" routerLinkActive="bg-blue-600 text-white shadow-lg"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition duration-300 font-bold">
        🚚 Pickups
      </a>
    </ng-container>

    <!-- ADMIN -->
    <ng-container *ngIf="role === 'admin'">
      <a routerLink="/dashboard-admin" routerLinkActive="bg-red-600 text-white shadow-lg"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition duration-300 font-bold">
        📊 Dashboard
      </a>

      <a routerLink="/admin" routerLinkActive="bg-red-600 text-white shadow-lg"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition duration-300 font-bold">
        🛠 Admin Panel
      </a>

      <a routerLink="/admin/pickups" routerLinkActive="bg-red-600 text-white shadow-lg"
        class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition duration-300 font-bold">
        🚚 Pickups
      </a>
    </ng-container>

    <div class="pt-4 border-t border-gray-800 opacity-50"></div>

    <!-- COMMON -->
    <a routerLink="/messages" routerLinkActive="bg-green-600 text-white shadow-lg"
      class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition duration-300 font-bold">
      💬 Messages
    </a>

    <a routerLink="/profile" routerLinkActive="bg-gray-600 text-white shadow-lg"
      class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition duration-300 font-bold">
      👤 Profile
    </a>

  </nav>

  <!-- Footer -->
  <div class="p-6 border-t border-gray-800 text-[10px] text-gray-500 font-bold uppercase tracking-widest text-center">
    WasteZero v1.0.0
  </div>

</div>
