<div class="fixed top-0 left-0 h-screen w-64 bg-[#0a0f0a] border-r border-green-900/20 flex flex-col z-50">

  <!-- Logo -->
  <div class="p-6 flex items-center gap-2 border-b border-green-900/20">
    <span class="w-2.5 h-2.5 bg-green-400 rounded-full animate-pulse"></span>
    <span class="text-xl font-bold text-green-300 tracking-tight">WasteZero</span>
  </div>

  <!-- Role Badge -->
  <div class="px-4 pt-4 pb-2">
    <span class="inline-block px-3 py-1 rounded-full text-xs font-medium uppercase tracking-wider"
          [ngClass]="{
            'bg-green-900/30 text-green-400 border border-green-900/40': role === 'user',
            'bg-teal-900/30 text-teal-400 border border-teal-900/40': role === 'volunteer',
            'bg-yellow-900/20 text-yellow-400 border border-yellow-900/30': role === 'admin'
          }">
      {{ role === 'user' ? 'Citizen' : role === 'volunteer' ? 'Pickup Agent' : 'Administrator' }}
    </span>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 mt-2 px-3 space-y-1 text-sm overflow-y-auto">

    <!-- USER -->
    <ng-container *ngIf="role === 'user'">
      <a routerLink="/dashboard-user" routerLinkActive="bg-green-900/40 text-green-300 border-green-700/40"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-green-600 hover:bg-green-900/20 hover:text-green-300 transition-all border border-transparent">
        <span class="text-base">📊</span> Dashboard
      </a>
      <a routerLink="/schedule-pickup" routerLinkActive="bg-green-900/40 text-green-300 border-green-700/40"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-green-600 hover:bg-green-900/20 hover:text-green-300 transition-all border border-transparent">
        <span class="text-base">♻️</span> Schedule Pickup
      </a>
    </ng-container>

    <!-- VOLUNTEER -->
    <ng-container *ngIf="role === 'volunteer'">
      <a routerLink="/dashboard-volunteer" routerLinkActive="bg-teal-900/40 text-teal-300 border-teal-700/40"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-green-600 hover:bg-teal-900/20 hover:text-teal-300 transition-all border border-transparent">
        <span class="text-base">📊</span> Dashboard
      </a>
      <a routerLink="/opportunities" routerLinkActive="bg-teal-900/40 text-teal-300 border-teal-700/40"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-green-600 hover:bg-teal-900/20 hover:text-teal-300 transition-all border border-transparent">
        <span class="text-base">📍</span> Opportunities
      </a>
    </ng-container>

    <!-- ADMIN -->
    <ng-container *ngIf="role === 'admin'">
      <a routerLink="/dashboard-admin" routerLinkActive="bg-yellow-900/30 text-yellow-300 border-yellow-700/30"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-green-600 hover:bg-yellow-900/20 hover:text-yellow-300 transition-all border border-transparent">
        <span class="text-base">📊</span> Dashboard
      </a>
      <a routerLink="/admin" routerLinkActive="bg-yellow-900/30 text-yellow-300 border-yellow-700/30"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-green-600 hover:bg-yellow-900/20 hover:text-yellow-300 transition-all border border-transparent">
        <span class="text-base">🛠️</span> Admin Panel
      </a>
    </ng-container>

    <!-- DIVIDER -->
    <div class="h-px bg-green-900/20 my-2"></div>

    <!-- COMMON -->
    <a routerLink="/messages" routerLinkActive="bg-green-900/40 text-green-300 border-green-700/40"
       class="flex items-center gap-3 px-4 py-3 rounded-xl text-green-600 hover:bg-green-900/20 hover:text-green-300 transition-all border border-transparent">
      <span class="text-base">💬</span> Messages
    </a>
    <a routerLink="/profile" routerLinkActive="bg-green-900/40 text-green-300 border-green-700/40"
       class="flex items-center gap-3 px-4 py-3 rounded-xl text-green-600 hover:bg-green-900/20 hover:text-green-300 transition-all border border-transparent">
      <span class="text-base">👤</span> Profile
    </a>

  </nav>

  <!-- Footer -->
  <div class="p-4 border-t border-green-900/20 text-xs text-green-900 text-center">
    © 2026 WasteZero
  </div>

</div>
