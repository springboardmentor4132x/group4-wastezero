<div class="animate-fade-up">

    <h2 class="text-3xl font-bold text-gray-800 mb-8">
        All Waste Pickups
    </h2>

    <!-- Filters / Actions (Optional for later) -->

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

        <div *ngIf="isLoading" class="col-span-3 text-center py-10 text-gray-500">
            Loading pickups...
        </div>

        <div *ngIf="!isLoading && pickups.length === 0"
            class="col-span-3 text-center py-10 text-gray-500 bg-white rounded-3xl shadow">
            No pickups found.
        </div>

        <div *ngFor="let pickup of pickups"
            class="bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden hover:shadow-2xl transition duration-500">

            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <span class="px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest" [ngClass]="{
                  'bg-yellow-100 text-yellow-700': pickup.status === 'pending',
                  'bg-blue-100 text-blue-700': pickup.status === 'accepted',
                  'bg-green-100 text-green-700': pickup.status === 'completed',
                  'bg-red-100 text-red-700': pickup.status === 'cancelled'
                }">
                        {{ pickup.status }}
                    </span>
                    <span class="text-xs text-gray-400 font-medium">
                        #{{ pickup._id.substring(pickup._id.length - 6) }}
                    </span>
                </div>

                <h3 class="text-xl font-bold text-gray-800 mb-2 truncate">
                    {{ pickup.wasteType | titlecase }} Pickup
                </h3>

                <div class="space-y-3 mb-6">
                    <div class="flex items-center gap-2 text-sm text-gray-600">
                        <span>👤</span>
                        <span class="font-medium">{{ pickup.user_id?.name }}</span>
                    </div>
                    <div class="flex items-center gap-2 text-sm text-gray-600">
                        <span>📍</span>
                        <span class="truncate">{{ pickup.address }}</span>
                    </div>
                    <div class="flex items-center gap-2 text-sm text-gray-600">
                        <span>📦</span>
                        <span>{{ pickup.quantity }} kg</span>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button *ngIf="pickup.status === 'pending'" (click)="updateStatus(pickup._id, 'accepted')"
                        class="flex-1 px-4 py-2 bg-blue-600 text-white text-sm font-bold rounded-xl hover:bg-blue-700 transition shadow-md">
                        Assign/Accept
                    </button>
                    <button *ngIf="pickup.status === 'accepted'" (click)="updateStatus(pickup._id, 'completed')"
                        class="flex-1 px-4 py-2 bg-green-600 text-white text-sm font-bold rounded-xl hover:bg-green-700 transition shadow-md">
                        Complete
                    </button>
                    <button *ngIf="pickup.status !== 'cancelled' && pickup.status !== 'completed'"
                        (click)="updateStatus(pickup._id, 'cancelled')"
                        class="px-4 py-2 bg-gray-100 text-gray-600 text-sm font-bold rounded-xl hover:bg-red-50 hover:text-red-600 transition">
                        Cancel
                    </button>
                </div>
            </div>

        </div>

    </div>

</div>
