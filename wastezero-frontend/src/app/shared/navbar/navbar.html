<div class="bg-white/60 backdrop-blur-md shadow-md px-6 py-4 flex justify-between items-center border-b">

  <h1 class="text-xl font-semibold text-gray-700 tracking-wide">
    🌱 WasteZero
  </h1>

  <div class="flex items-center gap-4">

    
    <!-- Dark Mode Toggle (Operational Shift) -->
    <button (click)="toggleDarkMode()" class="p-2 w-10 h-10 rounded-xl bg-gray-100 hover:bg-blue-50 hover:text-blue-600 transition flex items-center justify-center shadow-inner group">
      <span class="group-hover:scale-110 transition">🌙</span>
    </button>

    <!-- Notifications -->
    <div class="relative">
      <button (click)="toggleDropdown()" class="p-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition relative">
        🔔
        <span *ngIf="unreadCount > 0"
          class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">
          {{ unreadCount }}
        </span>
      </button>

      <!-- Dropdown Panel -->
      <div *ngIf="showDropdown"
        class="absolute right-0 mt-4 w-80 bg-white border rounded-2xl shadow-2xl z-50 animate-fade-in overflow-hidden">
        <div class="p-4 border-b flex justify-between items-center bg-gray-50">
          <h3 class="font-bold text-gray-800">Notifications</h3>
          <button (click)="markAllAsRead()" class="text-[10px] text-blue-600 font-bold uppercase hover:underline">
            Mark all read
          </button>
        </div>
        <div class="max-h-96 overflow-y-auto">
          <div *ngIf="notifications.length === 0" class="p-8 text-center text-gray-400 text-sm italic">
            No notifications yet
          </div>
          <div *ngFor="let n of notifications" 
               class="p-4 border-b hover:bg-gray-50 transition flex gap-3"
               [ngClass]="{'bg-blue-50/30': !n.isRead}">
            <div class="w-2 h-2 rounded-full mt-2 shrink-0" 
                 [ngClass]="n.isRead ? 'bg-gray-200' : 'bg-blue-600'"></div>
            <div>
              <p class="text-sm font-bold text-gray-800">{{ n.title }}</p>
              <p class="text-xs text-gray-600 mt-1">{{ n.message }}</p>
              <p class="text-[9px] text-gray-400 mt-2 font-bold uppercase tracking-widest">
                {{ n.createdAt | date:'shortTime' }}
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- User Name -->
    <div class="text-right flex flex-col">
      <span class="text-gray-800 font-bold leading-none">
        {{ displayName }}
      </span>
      <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">
        {{ role }}
      </span>
    </div>

    <!-- Logout -->
    <button (click)="logout()" class="bg-red-500 text-white px-4 py-2 rounded-xl hover:bg-red-600 transition shadow-md">
      Logout
    </button>

  </div>

</div>
