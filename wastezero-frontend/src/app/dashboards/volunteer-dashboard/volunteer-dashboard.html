<div class="animate-fade-up space-y-10">

  <div>
    <h2 class="text-3xl font-bold text-gray-800">
      Welcome Volunteer 👋
    </h2>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

    <div class="bg-white p-6 rounded-3xl shadow-md hover:shadow-2xl transition duration-300 hover:-translate-y-2">
      <p class="text-gray-500 text-sm">Available Pickups</p>
      <h3 class="text-4xl font-bold text-blue-600 mt-3">
        {{ available }}
      </h3>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-md hover:shadow-2xl transition duration-300 hover:-translate-y-2">
      <p class="text-gray-500 text-sm">Accepted</p>
      <h3 class="text-4xl font-bold text-blue-600 mt-3">
        {{ accepted }}
      </h3>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-md hover:shadow-2xl transition duration-300 hover:-translate-y-2">
      <p class="text-gray-500 text-sm">Completed</p>
      <h3 class="text-4xl font-bold text-blue-600 mt-3">
        {{ completed }}
      </h3>
    </div>

  </div>

</div>
