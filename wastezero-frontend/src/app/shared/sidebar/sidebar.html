<div class="fixed top-0 left-0 h-screen w-64 bg-gray-900 text-gray-200 shadow-2xl flex flex-col">

  <!-- Logo -->
  <div class="p-6 text-2xl font-bold border-b border-gray-700 tracking-wide">
    🌱 WasteZero
  </div>

  <!-- Navigation -->
  <nav class="flex-1 mt-6 px-4 space-y-2 text-sm">

    <!-- USER -->
    <ng-container *ngIf="role === 'user'">
      <a routerLink="/dashboard-user"
         routerLinkActive="bg-green-600 text-white"
         class="flex items-center gap-3 p-3 rounded-xl hover:bg-green-600 hover:text-white transition duration-300">
        📊 Dashboard
      </a>

      <a routerLink="/schedule-pickup"
         routerLinkActive="bg-green-600 text-white"
         class="flex items-center gap-3 p-3 rounded-xl hover:bg-green-600 hover:text-white transition duration-300">
        ♻️ Schedule Pickup
      </a>
    </ng-container>

    <!-- VOLUNTEER -->
    <ng-container *ngIf="role === 'volunteer'">
      <a routerLink="/dashboard-volunteer"
         routerLinkActive="bg-blue-600 text-white"
         class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-600 hover:text-white transition duration-300">
        📊 Dashboard
      </a>

      <a routerLink="/opportunities"
         routerLinkActive="bg-blue-600 text-white"
         class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-600 hover:text-white transition duration-300">
        📦 Opportunities
      </a>
    </ng-container>

    <!-- ADMIN -->
    <ng-container *ngIf="role === 'admin'">
      <a routerLink="/dashboard-admin"
         routerLinkActive="bg-red-600 text-white"
         class="flex items-center gap-3 p-3 rounded-xl hover:bg-red-600 hover:text-white transition duration-300">
        📊 Dashboard
      </a>

      <a routerLink="/admin"
         routerLinkActive="bg-red-600 text-white"
         class="flex items-center gap-3 p-3 rounded-xl hover:bg-red-600 hover:text-white transition duration-300">
        🛠 Admin Panel
      </a>
    </ng-container>

    <!-- COMMON -->
    <a routerLink="/messages"
       routerLinkActive="bg-purple-600 text-white"
       class="flex items-center gap-3 p-3 rounded-xl hover:bg-purple-600 hover:text-white transition duration-300">
      💬 Messages
    </a>

    <a routerLink="/profile"
       routerLinkActive="bg-gray-600 text-white"
       class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-600 hover:text-white transition duration-300">
      👤 Profile
    </a>

  </nav>

  <!-- Footer -->
  <div class="p-4 border-t border-gray-700 text-xs text-gray-400 text-center">
    © 2026 WasteZero
  </div>

</div>
