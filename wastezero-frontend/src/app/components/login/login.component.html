<div class="auth-container">
    <div class="auth-card">
        <h2>WasteZero Login</h2>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" formControlName="email"
                    placeholder="Enter your email">
                <div class="error-message" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
                    <small *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</small>
                    <small *ngIf="loginForm.get('email')?.errors?.['email']">Enter a valid email layout</small>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" formControlName="password"
                    placeholder="Enter your password" autocomplete="current-password">
                <div class="error-message"
                    *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                    <small *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</small>
                </div>
            </div>
            <div class="error-message" *ngIf="errorMessage">
                <p>{{ errorMessage }}</p>
            </div>
            <button type="submit" class="btn" [disabled]="loginForm.invalid">Login</button>
        </form>
        <div class="auth-links">
            <p>Don't have an account? <a routerLink="/register">Register here</a></p>
        </div>
    </div>
</div>
