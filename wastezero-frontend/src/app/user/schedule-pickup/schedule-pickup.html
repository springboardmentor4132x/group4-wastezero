<div class="max-w-3xl mx-auto p-10 bg-white shadow-2xl rounded-3xl animate-fade-up">

    <h2 class="text-3xl font-bold text-green-700 mb-8 flex items-center gap-3">
        ♻️ Schedule a Pickup
    </h2>

    <!-- Messages -->
    <div *ngIf="successMessage"
        class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl mb-6 shadow-sm">
        {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl mb-6 shadow-sm">
        {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Address -->
        <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Pickup Address</label>
            <input type="text" [(ngModel)]="address" name="address" required
                placeholder="Full address where pickup is needed"
                class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition">
        </div>

        <!-- Waste Type -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Type of Waste</label>
            <select [(ngModel)]="wasteType" name="wasteType" required
                class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition">
                <option value="plastic">Plastic</option>
                <option value="paper">Paper / Cardboard</option>
                <option value="metal">Metal</option>
                <option value="e-waste">E-Waste</option>
                <option value="organic">Organic / Compost</option>
            </select>
        </div>

        <!-- Quantity -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Estimated Quantity (kg)</label>
            <input type="number" [(ngModel)]="quantity" name="quantity" required placeholder="Weight in kg"
                class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition">
        </div>

        <!-- Date -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Preferred Date</label>
            <input type="date" [(ngModel)]="preferredDate" name="preferredDate" required
                class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition">
        </div>

        <!-- Additional Info -->
        <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Additional Notes (Optional)</label>
            <textarea [(ngModel)]="notes" name="notes" rows="3" placeholder="Gate code, specific instructions, etc."
                class="w-full px-5 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition"></textarea>
        </div>

        <!-- Submit -->
        <div class="md:col-span-2 flex justify-end">
            <button type="submit" [disabled]="isLoading"
                class="px-10 py-4 bg-green-600 text-white rounded-xl font-bold text-lg hover:bg-green-700 shadow-xl transition disabled:opacity-50">
                {{ isLoading ? 'Scheduling...' : '🚀 Schedule Pickup' }}
            </button>
        </div>

    </form>

</div>
