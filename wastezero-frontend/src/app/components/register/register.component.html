<div class="auth-container">
    <div class="auth-card" style="max-width: 500px;">
        <h2>Join WasteZero</h2>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" formControlName="name" placeholder="Name">
                <div class="error-message"
                    *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid">
                    <small>Name is required</small>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" formControlName="email" placeholder="Email">
                <div class="error-message"
                    *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
                    <small *ngIf="registerForm.get('email')?.errors?.['required']">Email is required</small>
                    <small *ngIf="registerForm.get('email')?.errors?.['email']">Enter a valid email</small>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" formControlName="password"
                    placeholder="Min 6 characters" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" formControlName="confirmPassword"
                    placeholder="Repeat password" autocomplete="new-password">
                <div class="error-message"
                    *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.errors?.['mismatch']">
                    <small>Passwords do not match</small>
                </div>
            </div>

            <div class="form-group">
                <label for="role">Select Role</label>
                <select id="role" class="form-control" formControlName="role">
                    <option value="" disabled>Choose your role</option>
                    <option value="user">User (Citizen)</option>
                    <option value="volunteer">Volunteer (Pickup Agent)</option>
                    <option value="admin">Admin</option>
                </select>
                <div class="error-message"
                    *ngIf="registerForm.get('role')?.touched && registerForm.get('role')?.invalid">
                    <small>Role selection is mandatory</small>
                </div>
            </div>

            <div class="form-group">
                <label for="location">Location (Optional)</label>
                <input type="text" id="location" class="form-control" formControlName="location"
                    placeholder="City or Area">
            </div>

            <div class="error-message" *ngIf="errorMessage">
                <p>{{ errorMessage }}</p>
            </div>

            <button type="submit" class="btn" [disabled]="registerForm.invalid">Register</button>
        </form>
        <div class="auth-links">
            <p>Already have an account? <a routerLink="/login">Login here</a></p>
        </div>
    </div>
</div>
