<div class="animate-fade-up space-y-10">

  <div>
    <h2 class="text-3xl font-bold text-gray-800">
      Welcome, <span class="text-blue-600">{{ userName }}</span> 👋
    </h2>
    <p class="text-gray-400 mt-1 font-medium uppercase tracking-widest text-[10px]">Volunteer Hero</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-8">

    <div
      class="bg-white p-6 rounded-3xl shadow-md border-b-4 border-b-blue-600 hover:shadow-2xl transition duration-300 hover:-translate-y-2">
      <p class="text-gray-500 text-xs font-black uppercase tracking-widest leading-none mb-4">Available Pickups</p>
      <h3 class="text-4xl font-black text-gray-800">
        {{ available }}
      </h3>
    </div>

    <div
      class="bg-white p-6 rounded-3xl shadow-md border-b-4 border-b-yellow-500 hover:shadow-2xl transition duration-300 hover:-translate-y-2">
      <p class="text-gray-500 text-xs font-black uppercase tracking-widest leading-none mb-4">In Progress</p>
      <h3 class="text-4xl font-black text-gray-800">
        {{ accepted }}
      </h3>
    </div>

    <div
      class="bg-white p-6 rounded-3xl shadow-md border-b-4 border-b-green-600 hover:shadow-2xl transition duration-300 hover:-translate-y-2">
      <p class="text-gray-500 text-xs font-black uppercase tracking-widest leading-none mb-4">Completed</p>
      <h3 class="text-4xl font-black text-gray-800">
        {{ completed }}
      </h3>
    </div>

    <!-- Personal Volunteer Card -->
    <div
      class="bg-gradient-to-br from-blue-700 to-blue-900 p-6 rounded-3xl shadow-lg hover:shadow-2xl transition duration-300 hover:-translate-y-2 text-white">
      <p class="text-blue-200 text-[10px] font-black uppercase tracking-widest mb-4">Volunteer Profile</p>
      <h3 class="text-xl font-bold truncate">{{ userName }}</h3>
      <div class="mt-2 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-green-400"></span>
        <span class="text-[10px] font-black tracking-widest uppercase">Verified Hero</span>
      </div>
    </div>

  </div>

  <div class="mt-8 flex gap-4">
    <button routerLink="/opportunities"
      class="bg-blue-600 text-white px-6 py-3 rounded-xl shadow-md hover:bg-blue-700 hover:shadow-lg transition">
      📦 View Opportunities
    </button>
  </div>

</div>
