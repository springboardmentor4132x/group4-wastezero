<div
  class="flex items-center justify-center min-h-screen bg-gradient-to-br from-gray-50 via-white to-green-50 px-4 animate-fade-in">

  <div
    class="bg-white/80 backdrop-blur-xl shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)] rounded-[3rem] p-12 w-full max-w-md border border-gray-100/50 transition-all duration-700 hover:shadow-[0_48px_96px_-24px_rgba(0,0,0,0.12)]">

    <!-- Industrial Icon -->
    <div class="flex justify-center mb-8">
      <div
        class="w-20 h-20 bg-green-600 rounded-[2rem] flex items-center justify-center text-4xl shadow-xl relative overflow-hidden group">
        <span class="z-10 group-hover:scale-125 transition duration-500">🌱</span>
        <div
          class="absolute inset-0 bg-gradient-to-tr from-white to-transparent opacity-0 group-hover:opacity-20 transition duration-500">
        </div>
      </div>
    </div>

    <div class="text-center mb-10">
      <h2 class="text-4xl font-black text-gray-900 tracking-tighter leading-none mb-3">
        Industrial <span class="text-green-600">Access</span>
      </h2>
      <p class="text-gray-400 font-bold uppercase tracking-[0.3em] text-[9px]">
        WasteZero Verification Protocol
      </p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-8">

      <!-- Email Identifier -->
      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 ml-1">Identity
          Identifier</label>
        <div class="relative group">
          <input type="email" formControlName="email" placeholder="operator@wastezero.com"
            class="w-full px-6 py-5 bg-gray-50 border-none rounded-3xl focus:ring-4 focus:ring-green-500/10 focus:bg-white outline-none transition-all duration-300 font-bold text-gray-700 shadow-inner">
          <div
            class="absolute inset-y-0 right-6 flex items-center text-gray-300 group-focus-within:text-green-500 transition">
            ✉️</div>
        </div>
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
          class="text-red-500 text-[10px] font-black mt-2 ml-1 uppercase tracking-widest animate-pulse">
          Valid identifier required
        </div>
      </div>

      <!-- Secret Key -->
      <div class="space-y-2">
        <div class="flex justify-between items-center ml-1">
          <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400">Security Signature</label>
        </div>
        <div class="relative group">
          <input type="password" formControlName="password" placeholder="••••••••"
            class="w-full px-6 py-5 bg-gray-50 border-none rounded-3xl focus:ring-4 focus:ring-green-500/10 focus:bg-white outline-none transition-all duration-300 font-bold text-gray-700 shadow-inner">
          <div
            class="absolute inset-y-0 right-6 flex items-center text-gray-300 group-focus-within:text-green-500 transition">
            🔑</div>
        </div>
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          class="text-red-500 text-[10px] font-black mt-2 ml-1 uppercase tracking-widest animate-pulse">
          Signature verify failed
        </div>
      </div>

      <!-- Fault Log -->
      <div *ngIf="errorMessage"
        class="bg-red-50/80 backdrop-blur border border-red-100 text-red-600 text-[10px] font-black uppercase tracking-widest p-5 rounded-3xl text-center shadow-lg shadow-red-500/5">
        ⚠️ Industrial Fault: {{ errorMessage }}
      </div>

      <!-- Execute Access -->
      <button type="submit" [disabled]="isLoading"
        class="w-full bg-gray-900 text-white py-6 rounded-3xl font-black uppercase tracking-[0.2em] text-xs shadow-2xl hover:bg-black hover:-translate-y-1 transition duration-500 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed group">
        <span *ngIf="!isLoading">Authorize Access <span
            class="group-hover:translate-x-1 inline-block transition">→</span></span>
        <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
          <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          Verifying Protocol...
        </span>
      </button>

    </form>

    <div class="mt-12 pt-8 border-t border-gray-50 text-center">
      <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">
        Identity not registered?
        <a routerLink="/register" class="text-green-600 hover:text-green-700 transition ml-1">Establish New Protocol</a>
      </p>
    </div>

  </div>

</div>
