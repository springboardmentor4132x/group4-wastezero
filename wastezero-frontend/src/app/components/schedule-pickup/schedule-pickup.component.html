<div class="pickup-container">
    <h2>Schedule a Waste Pickup</h2>
    <div class="alert alert-success" *ngIf="successMessage"
        style="background:#e8f5e9; color:#2e7d32; padding:10px; border-radius:5px; margin-bottom:15px; font-weight: 500;">
        {{ successMessage }}
    </div>

    <form [formGroup]="pickupForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label>Type of Waste</label>
            <select class="form-control" formControlName="wasteType">
                <option value="" disabled selected>Select waste type</option>
                <option value="Plastic">Plastic</option>
                <option value="Organic">Organic</option>
                <option value="E-Waste">E-Waste</option>
                <option value="Paper">Paper/Cardboard</option>
                <option value="Mixed">Mixed Household</option>
            </select>
        </div>

        <div class="form-group">
            <label>Estimated Quantity (kg)</label>
            <input type="number" class="form-control" formControlName="quantity" min="1" placeholder="e.g. 5">
        </div>

        <div class="form-group" style="display: flex; gap: 15px;">
            <div style="flex:1;">
                <label>Preferred Date</label>
                <input type="date" class="form-control" formControlName="date">
            </div>
            <div style="flex:1;">
                <label>Preferred Time</label>
                <input type="time" class="form-control" formControlName="time">
            </div>
        </div>

        <div class="form-group">
            <label>Pickup Address</label>
            <textarea class="form-control" formControlName="address" rows="3"
                placeholder="Enter full address..."></textarea>
        </div>

        <div class="form-group">
            <label>Additional Notes</label>
            <textarea class="form-control" formControlName="notes" rows="2"
                placeholder="Any specific instructions?"></textarea>
        </div>

        <button type="submit" class="btn" [disabled]="pickupForm.invalid" style="margin-top: 10px;">Schedule
            Pickup</button>
    </form>
</div>
